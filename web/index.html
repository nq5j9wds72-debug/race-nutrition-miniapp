<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race Nutrition Miniapp</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
    .muted { opacity: 0.7; }
    button { padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; margin-right: 8px; margin-top: 8px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f6f6f6; padding: 12px; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>Race Nutrition</h1>

  <div class="card">
    <div class="muted">Статус Telegram WebApp:</div>
    <div id="status">проверяю...</div>
    <hr />

    <div class="muted">Статус сервера:</div>
    <div id="serverStatus">ещё не проверяли</div>
    <hr />

    <button id="checkAuthBtn">Проверить auth</button>
    <button id="checkCalcBtn">Проверить calc</button>
  </div>

  <div class="card">
    <div class="muted">Ответ сервера:</div>
    <pre id="output">пока пусто</pre>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const statusEl = document.getElementById("status");
    const serverStatusEl = document.getElementById("serverStatus");
    const outputEl = document.getElementById("output");
    const checkAuthBtn = document.getElementById("checkAuthBtn");
    const checkCalcBtn = document.getElementById("checkCalcBtn");

    if (tg.initData) {
      statusEl.textContent = "Открыто внутри Telegram WebApp ✅";
    } else {
      statusEl.textContent = "Открыто вне Telegram ⚠️";
    }

    checkAuthBtn.addEventListener("click", async () => {
      outputEl.textContent = "Отправляю запрос auth...";
      serverStatusEl.textContent = "проверяем...";

      try {
        const res = await fetch("https://race-nutrition-miniapp.onrender.com/api/auth", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            initData: tg.initData || ""
          })
        });

        const data = await res.json();
        serverStatusEl.textContent = `auth: HTTP ${res.status}`;
        outputEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        serverStatusEl.textContent = "auth: ошибка запроса";
        outputEl.textContent = String(err);
      }
    });

    checkCalcBtn.addEventListener("click", async () => {
      outputEl.textContent = "Отправляю запрос calc...";
      serverStatusEl.textContent = "проверяем...";

      try {
        const res = await fetch("https://race-nutrition-miniapp.onrender.com/api/calc", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            race_type: "trail",
            duration_min: 360,
            weight_kg: 72,
            temperature_c: 24,
            fuel_format: "combo",
            gi_tolerance_level: "medium",
            effort_level: "race",
            humidity_pct: 68,
            distance_km: 50,
            sweat_rate_lph: null,
            elevation_gain_m: 1800,
            sodium_loss_profile: "unknown"
          })
        });

        const data = await res.json();
        serverStatusEl.textContent = `calc: HTTP ${res.status}`;
        outputEl.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        serverStatusEl.textContent = "calc: ошибка запроса";
        outputEl.textContent = String(err);
      }
    });
  </script>
</body>
</html>
