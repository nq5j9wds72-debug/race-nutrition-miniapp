<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race Nutrition Miniapp</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background: #ffffff;
      color: #111111;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .muted {
      opacity: 0.7;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      background: #fff;
    }

    button {
      cursor: pointer;
    }

    .box-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .hidden {
      display: none;
    }

    .errors {
      border: 1px solid #d33;
      background: #fff5f5;
      color: #a40000;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .warnings {
      border: 1px solid #e0a800;
      background: #fffaf0;
      color: #7a5600;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .result {
      border: 1px solid #ddd;
      background: #fafafa;
      border-radius: 12px;
      padding: 12px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .duration-inline {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 12px;
    }

    .duration-inline .row {
      margin-bottom: 0;
      flex: 0 0 120px;
    }

    .duration-inline .row input {
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Race Nutrition</h1>

  <div class="card">
    <div class="muted">Статус Telegram WebApp:</div>
    <div id="status">проверяю...</div>

    <hr />

    <div class="muted">Пользователь:</div>
    <div id="user">пока нет данных</div>

    <hr />

    <div class="muted">Статус сервера:</div>
    <div id="server-status">будет проверяться при расчёте</div>
  </div>

  <div class="card">
    <div class="box-title">Введите данные для расчёта</div>

    <div class="row">
      <label for="race_type">Тип гонки</label>
      <select id="race_type">
        <option value="road">Шоссе</option>
        <option value="trail">Трейл</option>
        <option value="ultra">Ультра</option>
      </select>
    </div>

    <div class="duration-inline">
      <div class="row">
        <label for="duration_hours">Часы</label>
        <input id="duration_hours" type="number" min="0" max="36" placeholder="6" />
      </div>

      <div class="row">
        <label for="duration_minutes">Минуты</label>
        <input id="duration_minutes" type="number" min="0" max="59" placeholder="30" />
      </div>
    </div>

    <div class="row">
      <label for="weight_kg">Вес (кг)</label>
      <input id="weight_kg" type="number" min="35" max="150" placeholder="Например: 72" />
    </div>

    <div class="row">
      <label for="temperature_c">Температура (°C)</label>
      <input id="temperature_c" type="number" min="-20" max="45" placeholder="Например: 24" />
    </div>

    <div class="row">
      <label for="fuel_format">Формат питания</label>
      <select id="fuel_format">
        <option value="drink_only">Только питьё</option>
        <option value="gels">Гели</option>
        <option value="combo">Комбинированно</option>
      </select>
    </div>

    <div class="row">
      <label for="gi_tolerance_level">Переносимость углеводов</label>
      <select id="gi_tolerance_level">
        <option value="low">Низкая</option>
        <option value="medium" selected>Средняя</option>
        <option value="high">Высокая</option>
      </select>
    </div>

    <button id="calc-btn" type="button">Рассчитать</button>
  </div>

  <div id="errors-box" class="errors hidden">
    <strong>Ошибки:</strong>
    <ul id="errors-list"></ul>
  </div>

  <div id="warnings-box" class="warnings hidden">
    <strong>Предупреждения:</strong>
    <ul id="warnings-list"></ul>
  </div>

  <div class="card">
    <div class="box-title">Результат</div>
    <div id="result" class="result">Пока расчёта нет.</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp
      ? window.Telegram.WebApp
      : null;

    const statusEl = document.getElementById("status");
    const userEl = document.getElementById("user");
    const serverStatusEl = document.getElementById("server-status");

    const raceTypeEl = document.getElementById("race_type");
    const durationHoursEl = document.getElementById("duration_hours");
    const durationMinutesEl = document.getElementById("duration_minutes");
    const weightEl = document.getElementById("weight_kg");
    const temperatureEl = document.getElementById("temperature_c");
    const fuelFormatEl = document.getElementById("fuel_format");
    const giToleranceEl = document.getElementById("gi_tolerance_level");
    const calcBtn = document.getElementById("calc-btn");

    const errorsBoxEl = document.getElementById("errors-box");
    const errorsListEl = document.getElementById("errors-list");
    const warningsBoxEl = document.getElementById("warnings-box");
    const warningsListEl = document.getElementById("warnings-list");
    const resultEl = document.getElementById("result");

    if (tg) {
      tg.ready();
      tg.expand();

      statusEl.textContent = "Открыто внутри Telegram WebApp ✅";

      const user = tg.initDataUnsafe && tg.initDataUnsafe.user
        ? tg.initDataUnsafe.user
        : null;

      if (user) {
        const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ");
        const username = user.username ? "(@" + user.username + ")" : "";
        userEl.textContent = (fullName || "Без имени") + " " + username;
      } else {
        userEl.textContent = "Пользователь не передан";
      }
    } else {
      statusEl.textContent = "Открыто вне Telegram ⚠️";
      userEl.textContent = "Нет данных пользователя";
    }

    function parseNumberOrNull(value) {
      if (value === "" || value === null || value === undefined) {
        return null;
      }

      const num = Number(value);
      return Number.isFinite(num) ? num : null;
    }

    function buildDurationMinutes() {
      const rawHours = durationHoursEl.value;
      const rawMinutes = durationMinutesEl.value;

      if (rawHours === "" && rawMinutes === "") {
        return null;
      }

      const hours = parseNumberOrNull(rawHours) ?? 0;
      const minutes = parseNumberOrNull(rawMinutes) ?? 0;

      return (hours * 60) + minutes;
    }

    function clearMessages() {
      errorsListEl.innerHTML = "";
      warningsListEl.innerHTML = "";
      errorsBoxEl.classList.add("hidden");
      warningsBoxEl.classList.add("hidden");
    }

    function showList(listEl, boxEl, items) {
      listEl.innerHTML = "";

      items.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item;
        listEl.appendChild(li);
      });

      boxEl.classList.remove("hidden");
    }

    function formatCalcResponse(data) {
      if (!data || typeof data !== "object") {
        return "Пустой или некорректный ответ сервера.";
      }

      const carbs = data.result?.carbs;
      const fluid = data.result?.fluid;
      const sodium = data.result?.sodium;
      const gels = data.result?.gel_equivalent;
      const planSummary = data.plan?.summary || "Расчёт выполнен.";
      const planSteps = data.plan?.plan_steps || [];

      return [
        planSummary,
        "",
        "Углеводы:",
        `- в час: ${carbs?.carbs_per_hour_g ?? "-"} г`,
        `- всего: ${carbs?.carbs_total_g ?? "-"} г`,
        `- интервал: каждые ${carbs?.carb_interval_min ?? "-"} мин`,
        `- за приём: ${carbs?.carbs_per_intake_g ?? "-"} г`,
        "",
        "Жидкость:",
        `- в час: ${fluid?.fluid_per_hour_ml ?? "-"} мл`,
        `- всего: ${fluid?.fluid_total_ml ?? "-"} мл`,
        `- интервал: каждые ${fluid?.fluid_interval_min ?? "-"} мин`,
        `- за приём: ${fluid?.fluid_per_intake_ml ?? "-"} мл`,
        "",
        "Натрий:",
        `- в час: ${sodium?.sodium_per_hour_mg ?? "-"} мг`,
        `- всего: ${sodium?.sodium_total_mg ?? "-"} мг`,
        `- интервал: каждые ${sodium?.sodium_interval_min ?? "-"} мин`,
        `- за приём: ${sodium?.sodium_per_intake_mg ?? "-"} мг`,
        "",
        "Эквивалент гелей:",
        `- в час: ${gels?.gels_per_hour_est ?? "-"} геля`,
        `- всего: ${gels?.gels_total_est ?? "-"} гелей`,
        `- база: ${gels?.gel_basis_g ?? "-"} г углеводов в 1 геле`,
        "",
        "Пошаговый план:",
        ...(planSteps.length ? planSteps.map(item => `- ${item}`) : ["- нет"])
      ].join("\n");
    }

    calcBtn.addEventListener("click", async () => {
      clearMessages();
      resultEl.textContent = "Отправляю запрос...";
      serverStatusEl.textContent = "проверяем...";

      const payload = {
        race_type: raceTypeEl.value,
        duration_min: buildDurationMinutes(),
        weight_kg: parseNumberOrNull(weightEl.value),
        temperature_c: parseNumberOrNull(temperatureEl.value),
        fuel_format: fuelFormatEl.value,
        gi_tolerance_level: giToleranceEl.value
      };

      try {
        const res = await fetch("https://race-nutrition-miniapp.onrender.com/api/calc", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        serverStatusEl.textContent = `calc: HTTP ${res.status}`;

        if (data.ok === false) {
          showList(errorsListEl, errorsBoxEl, data.errors || ["Неизвестная ошибка"]);
          resultEl.textContent = "Расчёт не выполнен.";
          return;
        }

        if (Array.isArray(data.warnings) && data.warnings.length > 0) {
          showList(warningsListEl, warningsBoxEl, data.warnings);
        }

        resultEl.textContent = formatCalcResponse(data);
      } catch (err) {
        serverStatusEl.textContent = "calc: ошибка запроса";
        resultEl.textContent = String(err);
      }
    });
  </script>
</body>
</html>
