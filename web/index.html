<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race Nutrition Miniapp</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background: #ffffff;
      color: #111111;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      background: #ffffff;
    }

    .muted {
      opacity: 0.7;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      background: #fff;
    }

    button {
      cursor: pointer;
    }

    .box-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .hidden {
      display: none;
    }

    .errors {
      border: 1px solid #d33;
      background: #fff5f5;
      color: #a40000;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .result {
      line-height: 1.5;
    }

    .result .card {
      margin-bottom: 12px;
    }

    .result .card:last-child {
      margin-bottom: 0;
    }

    .result h2,
    .result h3 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .result p {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .result ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .duration-inline {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 12px;
    }

    .duration-inline .row {
      margin-bottom: 0;
      flex: 0 0 120px;
    }

    .duration-inline .row input {
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Race Nutrition</h1>

  <div class="card">
    <div class="muted">Статус Telegram WebApp:</div>
    <div id="status">проверяю...</div>

    <hr />

    <div class="muted">Пользователь:</div>
    <div id="user">пока нет данных</div>

    <hr />

    <div class="muted">Статус сервера:</div>
    <div id="server-status">будет проверяться при расчёте</div>
  </div>

  <div class="card">
    <div class="box-title">Введите данные для расчёта</div>

    <div class="row">
      <label for="race_type">Тип гонки</label>
      <select id="race_type">
        <option value="road">Шоссе</option>
        <option value="trail">Трейл</option>
        <option value="ultra">Ультра</option>
      </select>
    </div>

    <div class="duration-inline">
      <div class="row">
        <label for="duration_hours">Часы</label>
        <input id="duration_hours" type="number" min="0" max="36" placeholder="6" />
      </div>

      <div class="row">
        <label for="duration_minutes">Минуты</label>
        <input id="duration_minutes" type="number" min="0" max="59" placeholder="30" />
      </div>
    </div>

    <div class="row">
      <label for="weight_kg">Вес (кг)</label>
      <input id="weight_kg" type="number" min="35" max="150" placeholder="Например: 72" />
    </div>

    <div class="row">
      <label for="temperature_c">Температура (°C)</label>
      <input id="temperature_c" type="number" min="-20" max="45" placeholder="Например: 24" />
    </div>

    <div class="row">
      <label for="fuel_format">Формат питания</label>
      <select id="fuel_format">
        <option value="drink_only">Только питьё</option>
        <option value="gels">Гели</option>
        <option value="combo">Комбинированно</option>
      </select>
    </div>

    <div class="row">
      <label for="gi_tolerance_level">Переносимость углеводов</label>
      <select id="gi_tolerance_level">
        <option value="low">Низкая</option>
        <option value="medium" selected>Средняя</option>
        <option value="high">Высокая</option>
      </select>
    </div>

    <hr />

    <div class="box-title">Дополнительные данные (необязательно)</div>

    <div class="row">
      <label for="effort_level">Интенсивность</label>
      <select id="effort_level">
        <option value="">Не выбрано</option>
        <option value="easy">Легко</option>
        <option value="steady">Умеренно</option>
        <option value="race">Соревнование</option>
      </select>
    </div>

    <div class="row">
      <label for="humidity_pct">Влажность (%)</label>
      <input id="humidity_pct" type="number" min="0" max="100" placeholder="Например: 68" />
    </div>

    <div class="row">
      <label for="distance_km">Дистанция (км)</label>
      <input id="distance_km" type="number" min="0" max="500" step="0.1" placeholder="Например: 50" />
    </div>

    <div class="row">
      <label for="sweat_rate_lph">Потоотделение (л/ч)</label>
      <input id="sweat_rate_lph" type="number" min="0" max="5" step="0.1" placeholder="Например: 0.8" />
    </div>

    <div class="row">
      <label for="elevation_gain_m">Набор высоты (м)</label>
      <input id="elevation_gain_m" type="number" min="0" max="20000" placeholder="Например: 1800" />
    </div>

    <div class="row">
      <label for="sodium_loss_profile">Потери натрия</label>
      <select id="sodium_loss_profile">
        <option value="">Не выбрано</option>
        <option value="low">Низкие</option>
        <option value="medium">Средние</option>
        <option value="high">Высокие</option>
        <option value="unknown">Не знаю</option>
      </select>
    </div>

    <button id="calc-btn" type="button">Рассчитать</button>
  </div>

  <div id="errors-box" class="errors hidden">
    <strong>Ошибки:</strong>
    <ul id="errors-list"></ul>
  </div>

  <div class="card">
    <div class="box-title">Результат</div>
    <div id="result" class="result">Пока расчёта нет.</div>
  </div>

  <script>
  const tg = window.Telegram && window.Telegram.WebApp
    ? window.Telegram.WebApp
    : null;

  const statusEl = document.getElementById("status");
  const userEl = document.getElementById("user");
  const serverStatusEl = document.getElementById("server-status");

  const raceTypeEl = document.getElementById("race_type");
  const durationHoursEl = document.getElementById("duration_hours");
  const durationMinutesEl = document.getElementById("duration_minutes");
  const weightEl = document.getElementById("weight_kg");
  const temperatureEl = document.getElementById("temperature_c");
  const fuelFormatEl = document.getElementById("fuel_format");
  const giToleranceEl = document.getElementById("gi_tolerance_level");

  const effortLevelEl = document.getElementById("effort_level");
  const humidityEl = document.getElementById("humidity_pct");
  const distanceEl = document.getElementById("distance_km");
  const sweatRateEl = document.getElementById("sweat_rate_lph");
  const elevationEl = document.getElementById("elevation_gain_m");
  const sodiumLossProfileEl = document.getElementById("sodium_loss_profile");

  const calcBtn = document.getElementById("calc-btn");

  const errorsBoxEl = document.getElementById("errors-box");
  const errorsListEl = document.getElementById("errors-list");
  const resultEl = document.getElementById("result");

  let telegramAuthOk = false;
  let authStatusText = "auth: не проверялся";
  let calcStatusText = "calc: не запускался";

  function renderServerStatus() {
    serverStatusEl.textContent = `${authStatusText} | ${calcStatusText}`;
  }

  renderServerStatus();

  if (tg) {
    tg.ready();
    tg.expand();

    statusEl.textContent = "Открыто внутри Telegram WebApp ✅";

    const user = tg.initDataUnsafe && tg.initDataUnsafe.user
      ? tg.initDataUnsafe.user
      : null;

    if (user) {
      const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ");
      const username = user.username ? "(@" + user.username + ")" : "";
      userEl.textContent = (fullName || "Без имени") + " " + username;
    } else {
      userEl.textContent = "Пользователь не передан";
    }
  } else {
    statusEl.textContent = "Открыто вне Telegram ⚠️";
    userEl.textContent = "Нет данных пользователя";
    authStatusText = "auth: вне Telegram";
    renderServerStatus();
  }

  function parseNumberOrNull(value) {
    if (value === "" || value === null || value === undefined) {
      return null;
    }

    const num = Number(value);
    return Number.isFinite(num) ? num : null;
  }

  function buildDurationMinutes() {
    const rawHours = durationHoursEl.value;
    const rawMinutes = durationMinutesEl.value;

    if (rawHours === "" && rawMinutes === "") {
      return null;
    }

    const hours = parseNumberOrNull(rawHours) ?? 0;
    const minutes = parseNumberOrNull(rawMinutes) ?? 0;

    return (hours * 60) + minutes;
  }

  function clearMessages() {
    errorsListEl.innerHTML = "";
    errorsBoxEl.classList.add("hidden");
  }

  function showList(listEl, boxEl, items) {
    listEl.innerHTML = "";

    items.forEach((item) => {
      const li = document.createElement("li");
      li.textContent = item;
      listEl.appendChild(li);
    });

    boxEl.classList.remove("hidden");
  }

  function roundTo5(value) {
    return Math.round(Number(value) / 5) * 5;
  }

  function roundToHalf(value) {
    return Math.round(Number(value) * 2) / 2;
  }

  function formatDuration(durationMin) {
    const totalMin = Number(durationMin || 0);
    const hours = Math.floor(totalMin / 60);
    const minutes = totalMin % 60;

    if (hours > 0) {
      return `${hours} ч ${String(minutes).padStart(2, "0")} мин`;
    }

    return `${minutes} мин`;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function formatCalcResult(data) {
    if (!data || !data.ok || !data.result) {
      return `<div class="card"><strong>Нет данных для отображения результата.</strong></div>`;
    }

    const durationHuman = formatDuration(data.normalized_input?.duration_min);

    const carbsTotal = Math.round(data.result.carbs?.carbs_total_g ?? 0);
    const carbsPerHour = Math.round(data.result.carbs?.carbs_per_hour_g ?? 0);
    const carbInterval = Math.round(data.result.carbs?.carb_interval_min ?? 0);
    const carbsPerIntake = Math.round(data.result.carbs?.carbs_per_intake_g ?? 0);

    const fluidTotal = Math.round(data.result.fluid?.fluid_total_ml ?? 0);
    const fluidPerHour = Math.round(data.result.fluid?.fluid_per_hour_ml ?? 0);
    const fluidInterval = Math.round(data.result.fluid?.fluid_interval_min ?? 0);
    const fluidPerIntake = roundTo5(data.result.fluid?.fluid_per_intake_ml ?? 0);

    const sodiumTotal = Math.round(data.result.sodium?.sodium_total_mg ?? 0);
    const sodiumPerHour = Math.round(data.result.sodium?.sodium_per_hour_mg ?? 0);
    const sodiumInterval = Math.round(data.result.sodium?.sodium_interval_min ?? 0);
    const sodiumPerIntake = Math.round(data.result.sodium?.sodium_per_intake_mg ?? 0);

    const gelsTotal = roundToHalf(data.result.gel_equivalent?.gels_total_est ?? 0);
    const gelsPerHour = roundToHalf(data.result.gel_equivalent?.gels_per_hour_est ?? 0);
    const gelBasis = Math.round(data.result.gel_equivalent?.gel_basis_g ?? 25);

    const summary = `На ${durationHuman} тебе нужен план: около ${carbsPerHour} г углеводов в час, ${fluidPerHour} мл жидкости в час и ${sodiumPerHour} мг натрия в час.`;

    const planSteps = Array.isArray(data.plan?.plan_steps) ? data.plan.plan_steps : [];
    const warnings = Array.isArray(data.warnings) ? data.warnings : [];

    const planHtml = planSteps.length
      ? `
        <div class="card">
          <h3>Как действовать на гонке</h3>
          <ul>
            ${planSteps.map((step) => `<li>${escapeHtml(step)}</li>`).join("")}
          </ul>
        </div>
      `
      : "";

    const warningsHtml = warnings.length
      ? `
        <div class="card">
          <h3>Что учесть</h3>
          <ul>
            ${warnings.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
          </ul>
        </div>
      `
      : "";

    return `
      <div class="card">
        <h2>План на гонку</h2>
        <p>${summary}</p>
        <div>Длительность: ${durationHuman}</div>
      </div>

      <div class="card">
        <h3>Углеводы</h3>
        <div>Всего: ${carbsTotal} г</div>
        <div>В час: ${carbsPerHour} г</div>
        <div>Интервал: каждые ${carbInterval} мин</div>
        <div>За приём: ${carbsPerIntake} г</div>
      </div>

      <div class="card">
        <h3>Жидкость</h3>
        <div>Всего: ${fluidTotal} мл</div>
        <div>В час: ${fluidPerHour} мл</div>
        <div>Интервал: каждые ${fluidInterval} мин</div>
        <div>За приём: ${fluidPerIntake} мл</div>
      </div>

      <div class="card">
        <h3>Натрий</h3>
        <div>Всего: ${sodiumTotal} мг</div>
        <div>В час: ${sodiumPerHour} мг</div>
        <div>Интервал: каждые ${sodiumInterval} мин</div>
        <div>За приём: ${sodiumPerIntake} мг</div>
      </div>

      <div class="card">
        <h3>Эквивалент в гелях</h3>
        <div>Всего: ${gelsTotal}</div>
        <div>В час: ${gelsPerHour}</div>
        <div>Основа расчёта: 1 гель = ${gelBasis} г углеводов</div>
      </div>

      ${planHtml}
      ${warningsHtml}
    `;
  }

  async function trackMiniappOpen() {
    if (!tg) {
      return;
    }

    try {
      await fetch("https://race-nutrition-miniapp.onrender.com/api/track-open", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          source: "telegram_webapp"
        })
      });
    } catch (err) {
      console.log("track-open error", err);
    }
  }

  async function checkTelegramAuth() {
    if (!tg) {
      authStatusText = "auth: вне Telegram";
      renderServerStatus();
      return;
    }

    const initData = typeof tg.initData === "string" ? tg.initData : "";

    if (!initData) {
      authStatusText = "auth: initData пустой";
      renderServerStatus();
      return;
    }

    authStatusText = "auth: проверяем...";
    renderServerStatus();

    try {
      const res = await fetch("https://race-nutrition-miniapp.onrender.com/api/auth", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          initData: initData
        })
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        telegramAuthOk = true;
        authStatusText = "auth: ok";
      } else {
        telegramAuthOk = false;
        authStatusText = `auth: HTTP ${res.status}`;
      }

      renderServerStatus();
    } catch (err) {
      telegramAuthOk = false;
      authStatusText = "auth: ошибка запроса";
      renderServerStatus();
    }
  }

  calcBtn.addEventListener("click", async () => {
    clearMessages();
    resultEl.innerHTML = "Отправляю запрос...";
    calcStatusText = "calc: проверяем...";
    renderServerStatus();

    const payload = {
      race_type: raceTypeEl.value,
      duration_min: buildDurationMinutes(),
      weight_kg: parseNumberOrNull(weightEl.value),
      temperature_c: parseNumberOrNull(temperatureEl.value),
      fuel_format: fuelFormatEl.value,
      gi_tolerance_level: giToleranceEl.value,

      effort_level: effortLevelEl.value || null,
      humidity_pct: parseNumberOrNull(humidityEl.value),
      distance_km: parseNumberOrNull(distanceEl.value),
      sweat_rate_lph: parseNumberOrNull(sweatRateEl.value),
      elevation_gain_m: parseNumberOrNull(elevationEl.value),
      sodium_loss_profile: sodiumLossProfileEl.value || null
    };

    try {
      const res = await fetch("https://race-nutrition-miniapp.onrender.com/api/calc", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      calcStatusText = `calc: HTTP ${res.status}`;
      renderServerStatus();

      if (data.ok === false) {
        showList(errorsListEl, errorsBoxEl, data.errors || ["Неизвестная ошибка"]);
        resultEl.innerHTML = "Расчёт не выполнен.";
        return;
      }

      resultEl.innerHTML = formatCalcResult(data);
    } catch (err) {
      calcStatusText = "calc: ошибка запроса";
      renderServerStatus();
      resultEl.innerHTML = escapeHtml(String(err));
    }
  });

  trackMiniappOpen();
  checkTelegramAuth();
</script>
</body>
</html>
