<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race Nutrition Miniapp</title>

  <!-- Telegram WebApp JS API -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; }
    .muted { opacity: 0.7; }
    button { padding: 10px 12px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Race Nutrition</h1>

  <div class="card">
    <div class="muted">Статус Telegram WebApp:</div>
    <div id="status">проверяю...</div>
    <hr />

    <div class="muted">Статус сервера:</div>
    <div id="serverStatus">проверяю...</div>
    <hr />

    <div class="muted">initData (для UI, не для доверия):</div>
    <div id="initData" style="word-break: break-all;"></div>
    <hr />

    <button id="btn">Показать user</button>
    <pre id="out"></pre>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const serverStatusEl = document.getElementById('serverStatus');
    const initDataEl = document.getElementById('initData');
    const outEl = document.getElementById('out');

    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    const API_BASE = 'https://race-nutrition-miniapp.onrender.com';

    async function checkServerHealth() {
      try {
        const r = await fetch(`${API_BASE}/health`);
        const data = await r.json();
        serverStatusEl.textContent = 'Сервер отвечает: ' + JSON.stringify(data);
      } catch (e) {
        serverStatusEl.textContent = 'Ошибка связи с сервером: ' + e.message;
      }
    }

    async function sendInitDataToServer(initData) {
      try {
        const r = await fetch(`${API_BASE}/api/auth`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData }),
        });

        const data = await r.json();
        console.log('server /api/auth:', data);
      } catch (e) {
        console.log('server /api/auth error:', e);
      }
    }

    async function testCalcRoute() {
      try {
        const r = await fetch(`${API_BASE}/api/calc-test`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ a: 2, b: 3 }),
        });

        const data = await r.json();
        console.log('server /api/calc-test:', data);
      } catch (e) {
        console.log('server /api/calc-test error:', e);
      }
    }

    checkServerHealth();
    testCalcRoute();

    if (!tg) {
      statusEl.textContent = 'Открыто НЕ внутри Telegram (браузер).';
      initDataEl.textContent = '(пусто)';
      sendInitDataToServer('');
    } else if (!tg.initData) {
      tg.ready();
      statusEl.textContent = 'Telegram.WebApp есть, но initData пустой (скорее всего открыто не из Telegram).';
      initDataEl.textContent = '(пусто)';
      sendInitDataToServer('');
    } else {
      tg.ready();
      statusEl.textContent = 'Открыто внутри Telegram WebApp ✅';
      initDataEl.textContent = tg.initData;
      sendInitDataToServer(tg.initData);
    }

    document.getElementById('btn').addEventListener('click', () => {
      if (!tg) {
        outEl.textContent = 'Нет Telegram.WebApp (открыто в обычном браузере).';
        return;
      }

      outEl.textContent = JSON.stringify(tg.initDataUnsafe?.user || null, null, 2);
    });
  </script>
</body>
</html>
