<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Race Nutrition Miniapp</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      margin: 0;
      background: #ffffff;
      color: #111111;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .muted {
      opacity: 0.7;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      background: #fff;
    }

    button {
      cursor: pointer;
    }

    .box-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .hidden {
      display: none;
    }

    .errors {
      border: 1px solid #d33;
      background: #fff5f5;
      color: #a40000;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .warnings {
      border: 1px solid #e0a800;
      background: #fffaf0;
      color: #7a5600;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .result {
      border: 1px solid #ddd;
      background: #fafafa;
      border-radius: 12px;
      padding: 12px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }
  </style>
</head>
<body>
  <h1>Race Nutrition</h1>

  <div class="card">
    <div class="muted">Статус Telegram WebApp:</div>
    <div id="status">проверяю...</div>

    <hr />

    <div class="muted">Пользователь:</div>
    <div id="user">пока нет данных</div>

    <hr />

    <div class="muted">Статус сервера:</div>
    <div id="server-status">будет проверяться при расчёте</div>
  </div>

  <div class="card">
    <div class="box-title">Введите данные для расчёта</div>

    <div class="row">
      <label for="race_type">Тип гонки</label>
      <select id="race_type">
        <option value="road">Шоссе</option>
        <option value="trail">Трейл</option>
        <option value="ultra">Ультра</option>
      </select>
    </div>

    <div class="row">
      <label for="duration_min">Длительность гонки (мин)</label>
      <input id="duration_min" type="number" min="30" max="2160" placeholder="Например: 360" />
    </div>

    <div class="row">
      <label for="weight_kg">Вес (кг)</label>
      <input id="weight_kg" type="number" min="35" max="150" placeholder="Например: 72" />
    </div>

    <div class="row">
      <label for="temperature_c">Температура (°C)</label>
      <input id="temperature_c" type="number" min="-20" max="45" placeholder="Например: 24" />
    </div>

    <div class="row">
      <label for="fuel_format">Формат питания</label>
      <select id="fuel_format">
        <option value="drink_only">Только питьё</option>
        <option value="gels">Гели</option>
        <option value="combo">Комбинированно</option>
      </select>
    </div>

    <div class="row">
      <label for="gi_tolerance_level">Переносимость углеводов</label>
      <select id="gi_tolerance_level">
        <option value="low">Низкая</option>
        <option value="medium">Средняя</option>
        <option value="high">Высокая</option>
      </select>
    </div>

    <button id="calc-btn" type="button">Рассчитать</button>
  </div>

  <div id="errors-box" class="errors hidden">
    <strong>Ошибки:</strong>
    <ul id="errors-list"></ul>
  </div>

  <div id="warnings-box" class="warnings hidden">
    <strong>Предупреждения:</strong>
    <ul id="warnings-list"></ul>
  </div>

  <div class="card">
    <div class="box-title">Результат</div>
    <div id="result" class="result">Пока расчёта нет.</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp
      ? window.Telegram.WebApp
      : null;

    const statusEl = document.getElementById("status");
    const userEl = document.getElementById("user");

    if (tg) {
      tg.ready();
      tg.expand();

      statusEl.textContent = "Открыто внутри Telegram WebApp ✅";

      const user = tg.initDataUnsafe && tg.initDataUnsafe.user
        ? tg.initDataUnsafe.user
        : null;

      if (user) {
        const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ");
        const username = user.username ? "(@" + user.username + ")" : "";
        userEl.textContent = (fullName || "Без имени") + " " + username;
      } else {
        userEl.textContent = "Пользователь не передан";
      }
    } else {
      statusEl.textContent = "Открыто вне Telegram ⚠️";
      userEl.textContent = "Нет данных пользователя";
    }
  </script>
</body>
</html>
